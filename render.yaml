databases:
  - name: tabernacle-db
    plan: free
    databaseName: tabernacle

services:
  - type: web
    name: tabernacle
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: tabernacle-db
          property: connectionString
